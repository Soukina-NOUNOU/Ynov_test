# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Serveur HTTPS principal
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/registry.crt;
    ssl_certificate_key /etc/nginx/certs/registry.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Nécessaire pour les grosses images Docker (pas de limite de taille)
    client_max_body_size 0;
    chunked_transfer_encoding on;

    # --- Registry API (push/pull) : /v2/ → registry:8000 ---
    location /v2/ {
        proxy_pass         http://registry:8000;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_pass_header  Authorization;
        proxy_read_timeout 900;
    }

    # --- Registry UI : reste du trafic → ui:3000 ---
    location / {
        proxy_pass         http://ui:3000;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}

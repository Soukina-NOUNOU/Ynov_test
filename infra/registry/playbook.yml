---
- name: Déploiement d'un Registre Docker Sécurisé (HTTPS) sur AWS
  hosts: registry_hosts
  become: true
  vars:
    project_dir: "/home/ubuntu/registry-stack"
    # On récupère l'IP publique automatiquement via les facts Ansible
    public_ip: "{{ ansible_host }}"
  tasks:
    # 1. Installation Docker & outils
    - name: Mise à jour du cache APT
      apt:
        update_cache: yes

    - name: Installation de Docker et Outils
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - apache2-utils  # pour htpasswd
          - python3-passlib
          - openssl         # pour générer le certificat SSL
        state: present

    - name: Ajout de l'utilisateur ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    # Réinitialise la connexion SSH pour que le nouveau groupe docker soit pris en compte
    - name: Reset de la connexion SSH
      meta: reset_connection

    # 2. Création de la structure de dossiers
    - name: Création des dossiers pour le registre
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/auth"
        - "{{ project_dir }}/data"
        - "{{ project_dir }}/certs"

    # 3. Génération du certificat SSL auto-signé (non-interactif)
    - name: Génération de la clé privée SSL
      command: >
        openssl genrsa -out {{ project_dir }}/certs/registry.key 4096
      args:
        creates: "{{ project_dir }}/certs/registry.key"

    - name: Génération du certificat SSL auto-signé (CN = IP publique)
      command: >
        openssl req -new -x509
        -key {{ project_dir }}/certs/registry.key
        -out {{ project_dir }}/certs/registry.crt
        -days 1095
        -subj "/CN={{ public_ip }}"
        -addext "subjectAltName=IP:{{ public_ip }}"
      args:
        creates: "{{ project_dir }}/certs/registry.crt"

    - name: Permissions sur les certificats
      file:
        path: "{{ item }}"
        owner: ubuntu
        group: ubuntu
        mode: '0640'
      loop:
        - "{{ project_dir }}/certs/registry.key"
        - "{{ project_dir }}/certs/registry.crt"

    # 4. Génération du fichier de mots de passe
    - name: Génération du mot de passe pour l'utilisateur admin du registre
      htpasswd:
        path: "{{ project_dir }}/auth/registry.password"
        name: admin
        password: "{{ registry_admin_password }}"
        owner: ubuntu
        group: ubuntu
        mode: 0640
        crypt_scheme: bcrypt

    # 5. Copie des fichiers de configuration
    - name: Copie du docker-compose.yml
      template:
        src: docker-compose.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Copie de la configuration Nginx (routage + SSL)
      template:
        src: nginx.conf
        dest: "{{ project_dir }}/nginx.conf"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    # 6. Récupération du certificat en local (pour docker login côté client)
    - name: Récupérer le certificat pour les clients Docker
      fetch:
        src: "{{ project_dir }}/certs/registry.crt"
        dest: "./registry.crt"
        flat: yes

    # 7. Démarrage de la stack
    - name: Arrêt de l'ancienne stack si elle existe
      command: docker compose down
      args:
        chdir: "{{ project_dir }}"
      ignore_errors: true

    - name: Démarrage de la stack sécurisée
      command: docker compose up -d
      args:
        chdir: "{{ project_dir }}"

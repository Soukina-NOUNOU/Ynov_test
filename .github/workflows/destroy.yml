name: Destroy Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Détruire toutes les instances du projet
        run: |
          echo "============================================"
          echo "  DESTRUCTION DE L'INFRASTRUCTURE"
          echo "============================================"

          # Terminer les instances du registre
          REGISTRY_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=Terraform-Registry-Server" "Name=instance-state-name,Values=running,pending" \
            --query "Reservations[*].Instances[*].InstanceId" --output text)
          if [ -n "$REGISTRY_IDS" ]; then
            echo "Destruction instances registre: $REGISTRY_IDS"
            aws ec2 terminate-instances --instance-ids $REGISTRY_IDS
          else
            echo "Aucune instance registre trouvée."
          fi

          # Terminer les instances de l'app
          APP_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ynov-app-server" "Name=instance-state-name,Values=running,pending" \
            --query "Reservations[*].Instances[*].InstanceId" --output text)
          if [ -n "$APP_IDS" ]; then
            echo "Destruction instances app: $APP_IDS"
            aws ec2 terminate-instances --instance-ids $APP_IDS
          else
            echo "Aucune instance app trouvée."
          fi

          # Attendre la terminaison
          ALL_IDS="$REGISTRY_IDS $APP_IDS"
          if [ -n "$(echo $ALL_IDS | tr -d ' ')" ]; then
            echo "Attente de la terminaison..."
            aws ec2 wait instance-terminated --instance-ids $ALL_IDS
          fi

          # Nettoyer les key pairs
          aws ec2 delete-key-pair --key-name registry_key_terraform 2>/dev/null || true
          aws ec2 delete-key-pair --key-name app_key_terraform 2>/dev/null || true

          # Nettoyer les security groups (peut échouer si en cours de suppression)
          sleep 10
          aws ec2 delete-security-group --group-name registry-sg-simple-ClickOpster 2>/dev/null || true
          aws ec2 delete-security-group --group-name app-sg 2>/dev/null || true

          echo "============================================"
          echo "  INFRASTRUCTURE DÉTRUITE AVEC SUCCÈS"
          echo "============================================"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3

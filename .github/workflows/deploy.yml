name: Deploy Application (Zero Touch)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 0. CHECKOUT + OUTILS
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Installer Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      # ============================================
      # 0.1 NETTOYAGE — Détruire les anciennes instances
      # ============================================
      - name: Nettoyer les anciennes instances (Registry + App)
        run: |
          echo "=== Recherche des anciennes instances ==="
          
          # Chercher TOUTES les instances (tous les états sauf terminated)
          ALL_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=Terraform-Registry-Server,ynov-app-server" \
            --query "Reservations[*].Instances[?State.Name!='terminated'].InstanceId" --output text)
          
          if [ -n "$ALL_IDS" ]; then
            echo "Destruction des instances: $ALL_IDS"
            aws ec2 terminate-instances --instance-ids $ALL_IDS
            echo "Attente de la terminaison complète..."
            aws ec2 wait instance-terminated --instance-ids $ALL_IDS
            echo "Instances terminées."
          else
            echo "Aucune instance trouvée."
          fi

          # Attendre que les ENIs soient libérées
          echo "Attente de la libération des ressources réseau (30s)..."
          sleep 30

          # Supprimer les anciennes key pairs
          echo "Suppression des key pairs..."
          aws ec2 delete-key-pair --key-name registry_key_terraform && echo "Key pair registry supprimée" || echo "Key pair registry absente ou déjà supprimée"
          aws ec2 delete-key-pair --key-name app_key_terraform && echo "Key pair app supprimée" || echo "Key pair app absente ou déjà supprimée"
          
          # Supprimer les security groups (avec retry car le détachement prend du temps)
          for sg_name in registry-sg-simple-ClickOpster app-sg; do
            # Vérifier si le SG existe
            SG_ID=$(aws ec2 describe-security-groups --group-names "$sg_name" --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "None")
            if [ "$SG_ID" = "None" ] || [ -z "$SG_ID" ]; then
              echo "SG $sg_name n'existe pas, rien à supprimer."
              continue
            fi
            for attempt in 1 2 3 4 5; do
              echo "Tentative $attempt/5 de suppression du SG $sg_name ($SG_ID)..."
              if aws ec2 delete-security-group --group-id "$SG_ID" 2>&1; then
                echo "SG $sg_name supprimé !"
                break
              fi
              echo "SG $sg_name pas encore supprimable, attente 15s..."
              sleep 15
            done
          done
          
          echo "=== Nettoyage terminé ==="
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3

      # 1. TERRAFORM REGISTRE Créer l'infra du registre Docker
      - name: Terraform Init (Registre)
        working-directory: infra/registry
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Apply (Registre)
        working-directory: infra/registry
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 2. BRIDGE REGISTRE Récupérer IP + clé SSH + inventaire
  
      - name: Exécuter le bridge registre (IP, clé SSH, inventaire)
        run: bash scripts/bridge-registry.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}


      # 3. ANSIBLE REGISTRE Configurer le registre Docker
    
      - name: Attendre que le serveur registre SSH soit prêt
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i registry-key.pem ubuntu@${{ env.REGISTRY_IP }} "echo OK" 2>/dev/null; then
              echo "Serveur registre SSH prêt !"
              exit 0
            fi
            echo "Tentative $i/30..."
            sleep 10
          done
          echo "Timeout: le serveur registre SSH n'est pas accessible"
          exit 1

      - name: Exécuter le playbook Ansible du registre
        env:
          SECRET_REG_USER: ${{ secrets.REGISTRY_USER }}
          SECRET_REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          ansible-playbook -i registry-inventory.ini infra/registry/playbook.yml \
            --extra-vars "registry_user=$SECRET_REG_USER registry_admin_password=$SECRET_REG_PASS"
 
      - name: Vérifier et récupérer le certificat du registre
        run: |
          echo "=== Recherche du certificat registry.crt ==="
          find . -name "registry.crt" -type f 2>/dev/null
          # Si le fetch Ansible ne l'a pas mis à la racine, on le récupère via SCP
          if [ ! -f "registry.crt" ]; then
            echo "Certificat non trouvé à la racine, récupération via SCP..."
            scp -o StrictHostKeyChecking=no -i registry-key.pem \
              ubuntu@${{ env.REGISTRY_IP }}:/home/ubuntu/registry-stack/certs/registry.crt ./registry.crt
          fi
          ls -la registry.crt
          echo "Certificat récupéré avec succès !"
      
      # 4. TERRAFORM APP Créer le serveur applicatif
  
      - name: Terraform Init (App)
        working-directory: infra/deploy
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Apply (App)
        working-directory: infra/deploy
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}


      # 5. BRIDGE APP Récupérer IP + clé SSH + inventaire
   
      - name: Exécuter le bridge app (IP, clé SSH, inventaire)
        run: bash scripts/bridge-app.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
   
      # 6. BUILD & PUSH Images Docker vers le registre privé

      - name: Configurer le certificat du registre et login Docker
        env:
          SECRET_REG_USER: ${{ secrets.REGISTRY_USER }}
          SECRET_REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          sudo mkdir -p /etc/docker/certs.d/${{ env.REGISTRY_IP }}
          sudo cp registry.crt /etc/docker/certs.d/${{ env.REGISTRY_IP }}/ca.crt
          sudo systemctl restart docker
          echo "$SECRET_REG_PASS" | docker login ${{ env.REGISTRY_IP }} -u "$SECRET_REG_USER" --password-stdin

      - name: Build et push de l'image API
        working-directory: my-app
        run: |
          docker build -f python.Dockerfile -t ${{ env.REGISTRY_IP }}/api:latest .
          docker push ${{ env.REGISTRY_IP }}/api:latest

      - name: Build et push de l'image React
        working-directory: my-app
        run: |
          docker build -f react.prod.Dockerfile \
            --build-arg REACT_APP_API_URL=http://${{ env.SERVER_IP }}:8000 \
            -t ${{ env.REGISTRY_IP }}/react:latest .
          docker push ${{ env.REGISTRY_IP }}/react:latest

      - name: Build et push de l'image Migration DB
        working-directory: my-app
        run: |
          docker build -f migration.Dockerfile -t ${{ env.REGISTRY_IP }}/migration:latest .
          docker push ${{ env.REGISTRY_IP }}/migration:latest

      - name: Attendre que le serveur app SSH soit prêt
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i app-key.pem ubuntu@${{ env.SERVER_IP }} "echo OK" 2>/dev/null; then
              echo "Serveur app SSH prêt !"
              exit 0
            fi
            echo "Tentative $i/30..."
            sleep 10
          done
          echo "Timeout: le serveur app SSH n'est pas accessible"
          exit 1


      # 7. ANSIBLE APP Déploiement de l'application
   
      - name: Préparer le certificat pour Ansible
        run: cp registry.crt ansible/registry.crt

      - name: Exécuter le playbook Ansible de l'app
        env:
          SECRET_REG_USER: ${{ secrets.REGISTRY_USER }}
          SECRET_REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
          SECRET_DB_ROOT_PASS: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          SECRET_DB_NAME: ${{ secrets.MYSQL_DATABASE }}
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml \
            --extra-vars "registry_url=${{ env.REGISTRY_IP }} registry_user=$SECRET_REG_USER registry_password=$SECRET_REG_PASS mysql_root_password=$SECRET_DB_ROOT_PASS mysql_database=$SECRET_DB_NAME"

      # 8. VALIDATION POST-DÉPLOIEMENT
  
      - name: Attendre le démarrage des services
        run: sleep 60

      - name: Vérifier que le Frontend répond
        run: |
          curl -f --retry 5 --retry-delay 10 http://${{ env.SERVER_IP }}:3000 || exit 1
          echo "Frontend OK !"

      - name: Vérifier que l'API répond
        run: |
          curl -f --retry 5 --retry-delay 10 http://${{ env.SERVER_IP }}:8000/users || exit 1
          echo "API OK !"

      # 9. RÉSULTAT URLs de l'application
  
      - name: Afficher les URLs de l'application
        run: |
          echo "Frontend : http://${{ env.SERVER_IP }}:3000"
          echo "API      : http://${{ env.SERVER_IP }}:8000"
          echo "Adminer  : http://${{ env.SERVER_IP }}:8080"
          echo "Registre : https://${{ env.REGISTRY_IP }}"

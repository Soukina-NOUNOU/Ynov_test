name: Deploy Application (Zero Touch)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Centralisation de tous les secrets et variables globales du Job
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-3
      SECRET_REG_USER: ${{ secrets.REGISTRY_USER }}
      SECRET_REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
      SECRET_DB_ROOT_PASS: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      SECRET_DB_NAME: ${{ secrets.MYSQL_DATABASE }}

    steps:
      # 0. CHECKOUT + OUTILS
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Installer Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      # 0.1 NETTOYAGE — Détruire uniquement l'ancienne instance App (le registry est persistant)
      - name: Nettoyer l'ancienne instance App (le Registry est conservé)
        run: |
          echo "=== Recherche de l'ancienne instance App ==="
          
          # Chercher UNIQUEMENT les instances App (le registry est persistant, on ne le détruit pas)
          APP_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ynov-app-server" \
            --query "Reservations[*].Instances[?State.Name!='terminated'].InstanceId" --output text)
          
          if [ -n "$APP_IDS" ]; then
            echo "Destruction des instances App: $APP_IDS"
            aws ec2 terminate-instances --instance-ids $APP_IDS
            echo "Attente de la terminaison complète..."
            aws ec2 wait instance-terminated --instance-ids $APP_IDS
            echo "Instances App terminées."
          else
            echo "Aucune instance App trouvée."
          fi

          # Attendre que les ENIs soient libérées
          echo "Attente de la libération des ressources réseau (30s)..."
          sleep 30

          # Supprimer uniquement la key pair de l'App (pas celle du registry)
          echo "Suppression de la key pair App..."
          aws ec2 delete-key-pair --key-name app_key_terraform && echo "Key pair app supprimée" || echo "Key pair app absente ou déjà supprimée"
          
          # Supprimer uniquement le security group de l'App (pas celui du registry)
          for sg_name in app-sg; do
            SG_ID=$(aws ec2 describe-security-groups --group-names "$sg_name" --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "None")
            if [ "$SG_ID" = "None" ] || [ -z "$SG_ID" ]; then
              echo "SG $sg_name n'existe pas, rien à supprimer."
              continue
            fi
            for attempt in 1 2 3 4 5; do
              echo "Tentative $attempt/5 de suppression du SG $sg_name ($SG_ID)..."
              if aws ec2 delete-security-group --group-id "$SG_ID" 2>&1; then
                echo "SG $sg_name supprimé !"
                break
              fi
              echo "SG $sg_name pas encore supprimable, attente 15s..."
              sleep 15
            done
          done
          
          echo "=== Nettoyage terminé ==="

      # 1. REGISTRE Détecter un registre existant ou en créer un nouveau
      - name: Détecter le registre Docker existant
        id: detect-registry
        run: |
          echo "=== Recherche d'un registre Docker existant ==="
          EXISTING_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=Terraform-Registry-Server" "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[0].PublicIpAddress" --output text)

          if [ -n "$EXISTING_IP" ] && [ "$EXISTING_IP" != "None" ]; then
            echo "Registre existant détecté : $EXISTING_IP"
            echo "REGISTRY_EXISTS=true" >> "$GITHUB_ENV"
            echo "REGISTRY_IP=$EXISTING_IP" >> "$GITHUB_ENV"
          else
            echo "Aucun registre existant trouvé. Il sera créé."
            echo "REGISTRY_EXISTS=false" >> "$GITHUB_ENV"
          fi

      # 1a. TERRAFORM REGISTRE Uniquement si aucun registre existant
      - name: Terraform Init (Registre)
        if: env.REGISTRY_EXISTS == 'false'
        working-directory: infra/registry
        run: terraform init

      - name: Terraform Apply (Registre)
        if: env.REGISTRY_EXISTS == 'false'
        working-directory: infra/registry
        run: terraform apply -auto-approve

      # 1b. BRIDGE REGISTRE — Uniquement si nouveau registre créé
      - name: Exécuter le bridge registre (IP, clé SSH, inventaire)
        if: env.REGISTRY_EXISTS == 'false'
        run: bash scripts/bridge-registry.sh

      # 1c. ANSIBLE REGISTRE — Uniquement si nouveau registre créé
      - name: Attendre que le serveur registre SSH soit prêt
        if: env.REGISTRY_EXISTS == 'false'
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i registry-key.pem ubuntu@$REGISTRY_IP "echo OK" 2>/dev/null; then
              echo "Serveur registre SSH prêt !"
              exit 0
            fi
            echo "Tentative $i/30..."
            sleep 10
          done
          echo "Timeout: le serveur registre SSH n'est pas accessible"
          exit 1

      - name: Exécuter le playbook Ansible du registre
        if: env.REGISTRY_EXISTS == 'false'
        run: |
          ansible-playbook -i registry-inventory.ini infra/registry/playbook.yml \
            --extra-vars "registry_user=$SECRET_REG_USER registry_admin_password=$SECRET_REG_PASS"
 
      # 1d. CERTIFICAT Récupération adaptée selon le cas
      - name: Récupérer le certificat du registre
        run: |
          if [ "$REGISTRY_EXISTS" = "true" ]; then
            echo "=== Récupération du certificat depuis le registre existant (openssl) ==="
            echo | openssl s_client -connect "$REGISTRY_IP":443 -servername "$REGISTRY_IP" 2>/dev/null \
              | openssl x509 > registry.crt
          else
            echo "=== Récupération du certificat du nouveau registre ==="
            find . -name "registry.crt" -type f 2>/dev/null
            # Si le fetch Ansible ne l'a pas mis à la racine, on le récupère via SCP
            if [ ! -f "registry.crt" ]; then
              echo "Certificat non trouvé à la racine, récupération via SCP..."
              scp -o StrictHostKeyChecking=no -i registry-key.pem \
                ubuntu@$REGISTRY_IP:/home/ubuntu/registry-stack/certs/registry.crt ./registry.crt
            fi
          fi
          ls -la registry.crt
          echo "Certificat récupéré avec succès !"
      
      # 2. TERRAFORM APP Créer le serveur applicatif
      - name: Terraform Init (App)
        working-directory: infra/deploy
        run: terraform init

      - name: Terraform Apply (App)
        working-directory: infra/deploy
        run: terraform apply -auto-approve

      # 3. BRIDGE APP Récupérer IP + clé SSH + inventaire
      - name: Exécuter le bridge app (IP, clé SSH, inventaire)
        run: bash scripts/bridge-app.sh
   
      # 4. BUILD & PUSH Images Docker vers le registre existant
      - name: Configurer le certificat du registre et login Docker
        run: |
          sudo mkdir -p /etc/docker/certs.d/$REGISTRY_IP
          sudo cp registry.crt /etc/docker/certs.d/$REGISTRY_IP/ca.crt
          sudo systemctl restart docker
          echo "$SECRET_REG_PASS" | docker login $REGISTRY_IP -u "$SECRET_REG_USER" --password-stdin

      - name: Build et push de l'image API
        working-directory: my-app
        run: |
          docker build -f python.Dockerfile -t $REGISTRY_IP/api:latest .
          docker push $REGISTRY_IP/api:latest

      - name: Build et push de l'image React
        working-directory: my-app
        run: |
          docker build -f react.prod.Dockerfile \
            --build-arg REACT_APP_API_URL=http://$SERVER_IP:8000 \
            -t $REGISTRY_IP/react:latest .
          docker push $REGISTRY_IP/react:latest

      - name: Build et push de l'image Migration DB
        working-directory: my-app
        run: |
          docker build -f migration.Dockerfile -t $REGISTRY_IP/migration:latest .
          docker push $REGISTRY_IP/migration:latest

      - name: Attendre que le serveur app SSH soit prêt
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i app-key.pem ubuntu@$SERVER_IP "echo OK" 2>/dev/null; then
              echo "Serveur app SSH prêt !"
              exit 0
            fi
            echo "Tentative $i/30..."
            sleep 10
          done
          echo "Timeout: le serveur app SSH n'est pas accessible"
          exit 1

      # 5. ANSIBLE APP Déploiement de l'application
      - name: Préparer le certificat pour Ansible
        run: cp registry.crt ansible/registry.crt

      - name: Exécuter le playbook Ansible de l'app
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml \
            --extra-vars "registry_url=$REGISTRY_IP registry_user=$SECRET_REG_USER registry_password=$SECRET_REG_PASS mysql_root_password=$SECRET_DB_ROOT_PASS mysql_database=$SECRET_DB_NAME"

      # 6. VALIDATION POST DÉPLOIEMENT
      - name: Attendre le démarrage des services
        run: sleep 60

      - name: Vérifier que le Frontend répond
        run: |
          curl -f --retry 5 --retry-delay 10 http://$SERVER_IP:3000 || exit 1
          echo "Frontend OK !"

      - name: Vérifier que l'API répond
        run: |
          curl -f --retry 5 --retry-delay 10 http://$SERVER_IP:8000/users || exit 1
          echo "API OK !"

      # 7. RÉSULTAT URLs de l'application
      - name: Afficher les URLs de l'application
        run: |
          echo "Frontend : http://$SERVER_IP:3000"
          echo "API/docs : http://$SERVER_IP:8000/docs"
          echo "Adminer  : http://$SERVER_IP:8080"
          echo "Registre : https://$REGISTRY_IP"

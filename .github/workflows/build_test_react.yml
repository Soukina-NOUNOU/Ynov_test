name: Build and Test React Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GITHUB_PAGES_URL: https://Soukina-NOUNOU.github.io/Ynov_test

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [21.x]

    steps:
      - name: Clone repository
        uses: actions/checkout@v2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies and run tests
        working-directory: my-app
        env:
          CI: true
        run: |
          npm ci
          npm run build --if-present
          npm test -- --coverage --watchAll=false
          npm run jsdoc
          cp -r docs build/
          
      - name: Display deployment URLs
        run: |
          echo " Application will be deployed to: ${{ env.GITHUB_PAGES_URL }}"
          echo " Documentation will be available at: ${{ env.GITHUB_PAGES_URL }}/docs/"
          echo " API Endpoint: https://jsonplaceholder.typicode.com"
          echo " Ready for production with JSONPlaceholder API!"
          
          
      - name: Upload coverage reports to codecov
        uses: codecov/codecov-action@v3
        env: 
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          directory: ./my-app/coverage
        
      - name: Run Cypress tests (headless)
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npm start
          working-directory: my-app
          wait-on: 'http://localhost:3000/Ynov_test'
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/**/*.cy.js

      - name: Upload Cypress test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: my-app/cypress/screenshots

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./my-app/build
          
  publish-npm:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    strategy:
      matrix:
        node-version: [21.x]
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
        
      - name: Authenticate with npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
        
      - name: Debug npm auth
        run: |
          echo "Testing npm authentication..."
          npm whoami || echo " npm auth failed"
          
      - name: build and publish package on NPM
        working-directory: my-app
        run: |
          git config --global user.email "soukina.nounou@gmail.com"
          git config --global user.name "soukina"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          npm run build-npm-ci
          npm version patch
          
          # Check if the package already exists on npm
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view $PACKAGE_NAME version > /dev/null 2>&1; then
            echo " Package exists, publishing update..."
            npm publish
          else
            echo " New package, publishing with public access..."
            npm publish --access public
          fi
          
          git add .
          git commit -m "updated version"
          git push
        
  deploy:
    needs: publish-npm
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}  
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Display final URLs
        run: |
          echo "Deployment completed successfully!"
          echo ""
          echo "Application URL: ${{ env.GITHUB_PAGES_URL }}"
          echo "Documentation URL: ${{ env.GITHUB_PAGES_URL }}/docs/"
          echo "Powered by JSONPlaceholder API: https://jsonplaceholder.typicode.com"
name: Build and Test React Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GITHUB_PAGES_URL: https://Soukina-NOUNOU.github.io/Ynov_test

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [21.x]

    steps:
      - name: Clone repository
        uses: actions/checkout@v2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies and run tests
        working-directory: my-app
        env:
          CI: true
        run: |
          npm ci
          npm run build --if-present
          npm test -- --coverage --watchAll=false
          npm run jsdoc
          cp -r docs build/
          
          
      - name: Display deployment URLs
        run: |
          echo "Application will be deployed to: ${{ env.GITHUB_PAGES_URL }}"
          echo "Documentation will be available at: ${{ env.GITHUB_PAGES_URL }}/docs/"

      - name: Upload coverage reports to codecov
        uses: codecov/codecov-action@v3
        env: 
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          directory: ./my-app/coverage

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./my-app/build
          
  publish-npm:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    strategy:
      matrix:
        node-version: [21.x]
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}
          
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
        
      - name: Authenticate with npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN_NEW }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          
      - name: build and publish package on NPM
        working-directory: my-app
        run: |
          git config --global user.email "soukina.nounou@gmail.com"
          git config --global user.name "soukina"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          npm run build-npm-ci
          
          # Get current versions
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "0.0.0")
          
          echo "Package: $PACKAGE_NAME"
          echo "Local version: $LOCAL_VERSION" 
          echo "Published version: $PUBLISHED_VERSION"
          
          # Compare versions to decide if publication is needed
          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping publication"
            echo "Pipeline continues without publishing"
          else
            echo "Publishing new version $LOCAL_VERSION..."
            
            if npm view $PACKAGE_NAME version > /dev/null 2>&1; then
              echo "Package exists, publishing update..."
              npm publish
            else
              echo "New package, publishing with public access..."
              npm publish --access public
            fi
            
            echo "Package published successfully!"
            
            # Commit version changes if any
            git add .
            git commit -m "published version $LOCAL_VERSION" || echo "Nothing to commit"
            git push
          fi
        
  docker-integration-test:
    needs: publish-npm
    runs-on: ubuntu-latest
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v2

      - name: Create .env file
        working-directory: my-app
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}" >> .env

      - name: Build and start services
        working-directory: my-app
        run: docker compose up -d --build --wait

      - name: Check all containers are running
        working-directory: my-app
        run: docker compose ps

      - name: Test API Endpoint
        working-directory: my-app
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/users)
          if [ "$response" != "200" ]; then
            echo "API test failed with status code: $response"
            docker compose logs api
            exit 1
          fi
          
      - name: Validate API Response
        run: |
          users_count=$(curl -s http://localhost:8000/users | jq '.utilisateurs | length')
          if [ "$users_count" -eq 0 ]; then
            echo "API test failed: No users found"
            exit 1
          fi
          echo "API validation successful: $users_count users found"

      - name: Run Cypress E2E tests against real API
        uses: cypress-io/github-action@v6
        with:
          working-directory: my-app
          wait-on: 'http://localhost:3000/Ynov_test'
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/**/*.cy.js
        env:
          CYPRESS_BASE_URL: http://localhost:3000/Ynov_test

      - name: Upload Cypress test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: my-app/cypress/screenshots

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag and Push API Image to Docker Hub
        run: |
          docker tag my-app-api ${{ secrets.DOCKERHUB_USERNAME }}/python_fast_api:0.0.1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python_fast_api:0.0.1
          echo "Image successfully pushed to Docker Hub!"
        
  deploy:
    needs: docker-integration-test
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}  
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Display final URLs
        run: |
          echo "Deployment completed successfully!"
          echo ""
          echo "Application URL: ${{ env.GITHUB_PAGES_URL }}"
          echo "Documentation URL: ${{ env.GITHUB_PAGES_URL }}/docs/"
          echo "API URL: ${{ secrets.REACT_APP_API_URL }}"
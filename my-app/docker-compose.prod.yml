services:
  db:
    image: mysql:9.6
    command: >
      --innodb-buffer-pool-size=64M
      --innodb-redo-log-capacity=128M
      --max-connections=20
      --performance-schema=OFF
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - db-data:/var/lib/mysql
      - ./sqlfiles/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "mysql --user=root --password=$$MYSQL_ROOT_PASSWORD $$MYSQL_DATABASE --execute \"SELECT 1 FROM utilisateur LIMIT 0;\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  api:
    image: ${REGISTRY_URL}/api:latest
    ports:
      - 8000:8000
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_HOST=db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/users || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  react:
    image: ${REGISTRY_URL}/react:latest
    ports:
      - 3000:80
    depends_on:
      api:
        condition: service_healthy

  adminer:
    image: adminer
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
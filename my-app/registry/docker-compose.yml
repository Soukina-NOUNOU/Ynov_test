version: '3.8'
services:
  registry:
    image: registry:2
    restart: always
    # Pas de ports exposés : accessible uniquement en interne via le réseau Docker
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: Registry Realm
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/registry.password
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - ./data:/var/lib/registry
      - ./auth:/auth:ro
    networks:
      - registry-net

  ui:
    image: joxit/docker-registry-ui:main
    restart: always
    # Pas de ports exposés : accès uniquement via nginx
    environment:
      - REGISTRY_TITLE=Ansible Deployed Registry
      - REGISTRY_URL=https://13.37.240.71
      - REGISTRY_SECURED=true
      - SINGLE_REGISTRY=true
      - DELETE_IMAGES=true
    depends_on:
      - registry
    networks:
      - registry-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - registry
      - ui
    networks:
      - registry-net

networks:
  registry-net:
    driver: bridge

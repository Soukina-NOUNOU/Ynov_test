version: '3.1'

services:

  db:
    image: mysql:9.6
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
    ports:
      - 3306:3306
    volumes:
      - ./sqlfiles/:/docker-entrypoint-initdb.d/
    healthcheck:
      # Uses DB_NAME (not MYSQL_DATABASE) to avoid Docker auto-creating the DB before scripts run.
      test: ["CMD-SHELL", "mysql --user=root --password=$$MYSQL_ROOT_PASSWORD $$DB_NAME --execute \"SELECT 1 FROM utilisateur LIMIT 0;\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: python.Dockerfile
    ports:
      - 8000:8000
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE} 
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_HOST=db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Socket check: verifies uvicorn is listening on port 8000 without triggering a MySQL query
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8000), timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  react:
    image: react
    build:
      context: .
      dockerfile: react.Dockerfile
    ports:
      - 3000:3000
    environment:
      - REACT_APP_SERVER_PORT=8000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start
    depends_on:
      api:
        condition: service_healthy

  adminer:
    image: adminer
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy